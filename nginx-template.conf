# Nginx config for Schedulio# Helyezze el: /etc/nginx/sites-available/schedulio
# ln -s /etc/nginx/sites-available/schedulio /etc/nginx/sites-enabled/schedulio
# nginx -t && systemctl reload nginx
#
# Port használat a VPS-en:
#   - davelopment.hu        → portok 1337 + 3000 (érintetlen)
#   - schedulio.hu          → port 3001 (ez a config)
#
# A Next.js futtatása pl. systemd vagy pm2 alatt:
#   PORT=3001 node .next/standalone/server.js
#   vagy: pm2 start npm --name "schedulio" -- start -- -p 3001

upstream schedulio_backend {
  server localhost:3001;
}

# ─── HTTP → HTTPS redirect ─────────────────────────────────────────
server {
  listen 80;
  listen [::]:80;
  server_name schedulio.hu www.schedulio.hu;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://schedulio.hu$request_uri;
  }
}

# ─── www → root redirect ──────────────────────────────────────────
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name www.schedulio.hu;

  ssl_certificate /etc/letsencrypt/live/schedulio.hu/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/schedulio.hu/privkey.pem;

  return 301 https://schedulio.hu$request_uri;
}

# ─── HTTPS main server ────────────────────────────────────────────
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name schedulio.hu;

  # SSL (Let's Encrypt)
  ssl_certificate /etc/letsencrypt/live/schedulio.hu/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/schedulio.hu/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  # Security headers
  add_header X-Frame-Options SAMEORIGIN always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  # Logger
  access_log /var/log/nginx/schedulio-access.log;
  error_log /var/log/nginx/schedulio-error.log;

  # Méret limit (image uploadhoz)
  client_max_body_size 10M;

  # Gzip
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

  # ─── Next.js static asset cache ────────────────────────────────
  location /_next/static {
    proxy_pass http://schedulio_backend;
    proxy_cache_valid 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }

  # ─── Public files (kép feltöltések, favicon, logók) ────────────
  location /uploads {
    alias /var/www/schedulio/public/uploads;
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
  }

  location ~* \.(svg|png|jpg|jpeg|gif|ico|webp)$ {
    proxy_pass http://schedulio_backend;
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
  }

  # ─── Minden más → Next.js ──────────────────────────────────────
  location / {
    proxy_pass http://schedulio_backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 60s;
  }
}
